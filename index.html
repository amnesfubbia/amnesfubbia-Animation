<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>amnesfubbia music v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Glassmorphism Effect */
        .glass-header { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1c1c1c; }

        /* Splash Screen */
        #splashScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        
        /* Music Grid */
        .music-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; padding-bottom: 90px; }
        .music-card { position: relative; aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .music-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .music-card:active img { transform: scale(0.95); opacity: 0.7; }
        .video-badge { position: absolute; top: 5px; right: 5px; background: red; color: white; font-size: 8px; font-weight: 900; padding: 2px 4px; border-radius: 2px; }

        /* Player Modal */
        #playerModal { display: none; position: fixed; inset: 0; background: #000; z-index: 9000; flex-direction: column; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        #ytPlayer { width: 100%; height: 100%; }

        .disk-spin { animation: rotateDisk 10s linear infinite; }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #1c1c1c; display: flex; justify-content: space-around; padding: 12px 0; z-index: 8000; }
        .nav-item { color: #8e8e8e; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; }
        .nav-item.active { color: #fff; }

        .search-input { background: #262626; border-radius: 8px; padding: 8px 12px; margin: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .search-input input { background: transparent; border: none; outline: none; color: #fff; flex: 1; font-size: 14px; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <i class="ph-fill ph-Record text-6xl text-white"></i>
        <div class="mt-4 font-black tracking-[0.3em] text-white uppercase text-xs">amnesfubbia</div>
    </div>

    <div id="mainApp" style="opacity:0">
        <header class="glass-header p-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-black tracking-tighter">amnesfubbia</h1>
                <div class="flex gap-5">
                    <i class="ph ph-heart text-2xl"></i>
                    <i class="ph ph-chat-circle text-2xl"></i>
                </div>
            </div>
            
            <div class="flex items-center gap-4 mb-4">
                <div class="w-20 h-20 rounded-full border-2 border-zinc-800 p-1">
                    <img src="https://i.pinimg.com/736x/8f/c0/51/8fc0510e82030997193d5f1d44146747.jpg" class="w-full h-full rounded-full object-cover">
                </div>
                <div class="flex-1 flex justify-around text-center">
                    <div><div class="font-bold">4.2k</div><div class="text-[10px] text-zinc-500 uppercase">Tracks</div></div>
                    <div><div class="font-bold">892</div><div class="text-[10px] text-zinc-500 uppercase">MV</div></div>
                    <div><div class="font-bold">15k</div><div class="text-[10px] text-zinc-500 uppercase">Fans</div></div>
                </div>
            </div>

            <div class="search-input">
                <i class="ph ph-magnifying-glass text-zinc-500"></i>
                <input type="text" id="musicSearch" placeholder="Search official music video..." onkeydown="if(event.key==='Enter') searchMusic()">
            </div>
        </header>

        <div id="feedGrid" class="music-grid">
            </div>
    </div>

    <div id="playerModal">
        <div class="p-4 flex items-center justify-between">
            <i class="ph ph-caret-down text-2xl" onclick="closePlayer()"></i>
            <div class="text-xs font-bold uppercase tracking-widest text-zinc-500" id="nowPlaying">Official Video</div>
            <i class="ph ph-share-network text-2xl"></i>
        </div>

        <div class="video-container">
            <div id="ytPlayer"></div>
        </div>

        <div class="p-6">
            <h2 id="mTrack" class="text-2xl font-black leading-tight">Song Title</h2>
            <p id="mArtist" class="text-red-500 font-bold text-sm mt-1 uppercase">Official Music Video</p>
            
            <div class="mt-8 p-4 bg-zinc-900 rounded-xl">
                <div class="text-xs text-zinc-500 font-bold mb-2 uppercase tracking-tighter">Description</div>
                <p id="mDesc" class="text-sm text-zinc-300 line-clamp-3">Loading video information...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="ph-fill ph-house text-2xl"></i><span>Home</span></div>
        <div class="nav-item"><i class="ph ph-compass text-2xl"></i><span>Discover</span></div>
        <div class="nav-item"><i class="ph ph-play-circle text-2xl"></i><span>Reels</span></div>
        <div class="nav-item"><i class="ph ph-user text-2xl"></i><span>Library</span></div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                videoId: '',
                playerVars: { 'autoplay': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            // Player is ready
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splashScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splashScreen').style.display = 'none';
                    document.getElementById('mainApp').style.opacity = '1';
                }, 500);
                searchMusic('Lofi Chill Mix'); 
            }, 2000);
        };

        async function searchMusic(query) {
            const q = query || document.getElementById('musicSearch').value;
            if(!q) return;

            const grid = document.getElementById('feedGrid');
            grid.innerHTML = '<div class="col-span-3 text-center py-20 text-xs text-zinc-500">Tuning frequency...</div>';

            try {
                // Mencari menggunakan noembed (teknik legal untuk ambil thumbnail & judul video YouTube tanpa API Key Kompleks)
                // Catatan: Untuk pencarian lebih akurat di skala besar, disarankan menggunakan YouTube Data API v3
                const res = await fetch(`https://tools.mxdigital.co/yt-proxy.php?q=${encodeURIComponent(q + " music video")}`);
                // Karena ini demo, saya mensimulasikan hasil dari YouTube scraper/proxy
                // Jika ingin hasil nyata, Anda perlu API Key YouTube atau backend proxy.
                
                // Demo data (Harap ganti dengan real fetch jika sudah punya API Key)
                const mockData = [
                    {id: 'jfKfPfyJRdk', title: 'lofi hip hop radio', thumb: 'https://img.youtube.com/vi/jfKfPfyJRdk/hqdefault.jpg'},
                    {id: '5qap5aO4i9A', title: 'lofi hip hop radio', thumb: 'https://img.youtube.com/vi/5qap5aO4i9A/hqdefault.jpg'},
                    {id: 'DWcUY5XDX40', title: 'Coffee Shop Radio', thumb: 'https://img.youtube.com/vi/DWcUY5XDX40/hqdefault.jpg'},
                    {id: 'tNkZsRW7h2c', title: 'Soft Day', thumb: 'https://img.youtube.com/vi/tNkZsRW7h2c/hqdefault.jpg'},
                    {id: '7NOSDKb0HlU', title: 'Sunset Vibes', thumb: 'https://img.youtube.com/vi/7NOSDKb0HlU/hqdefault.jpg'},
                    {id: 'Lp9FmUInu7A', title: 'Midnight City', thumb: 'https://img.youtube.com/vi/Lp9FmUInu7A/hqdefault.jpg'}
                ];

                grid.innerHTML = '';
                mockData.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'music-card';
                    card.onclick = () => openPlayer(video.id, video.title);
                    card.innerHTML = `
                        <div class="video-badge">MV</div>
                        <img src="${video.thumb}" loading="lazy">
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<div class="col-span-3 text-center py-20 text-xs">Koneksi terputus. Coba lagi.</div>';
            }
        }

        function openPlayer(videoId, title) {
            document.getElementById('playerModal').style.display = 'flex';
            document.getElementById('mTrack').innerText = title;
            player.loadVideoById(videoId);
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            player.stopVideo();
        }
    </script>
</body>
</html>
