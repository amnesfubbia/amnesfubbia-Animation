<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>amnesfubbia music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* SPLASH SCREEN */
        #splashScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .splash-logo { width: 80px; height: 80px; margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* HEADER & PROFILE */
        .profile-header { padding: 15px; border-bottom: 1px solid #1c1c1c; }
        .ig-logo { font-weight: 900; font-size: 22px; letter-spacing: -1px; }
        
        /* MUSIC GRID - 3 COLUMNS */
        .music-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; padding-bottom: 80px; }
        .track-card { position: relative; aspect-ratio: 1/1; background: #111; overflow: hidden; cursor: pointer; }
        .track-card img { width: 100%; height: 100%; object-fit: cover; }
        .track-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: flex-end; padding: 5px; }
        .track-title { font-size: 9px; font-weight: 700; truncate: true; width: 100%; }

        /* PLAYER MODAL (IG POST STYLE) */
        #playerModal { display: none; position: fixed; inset: 0; z-index: 8000; background: #000; overflow-y: auto; }
        .album-art-full { width: 100%; aspect-ratio: 1/1; background: #111; }
        
        /* AUDIO PLAYER CUSTOM STYLE */
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); margin: 10px 0; }
        
        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #1c1c1c; display: flex; justify-content: space-around; padding: 15px 0; z-index: 9000; }
        .nav-item { color: #8e8e8e; font-size: 22px; }
        .nav-item.active { color: #fff; }

        /* HIGHLIGHTS STYLES */
        .highlight-circle { width: 64px; height: 64px; border-radius: 50%; border: 1px solid #333; padding: 2px; flex-shrink: 0; }
        .highlight-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="amnesfubbia.png" class="splash-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3844/3844724.png'">
        <div class="text-xl font-black tracking-tighter">amnesfubbia music</div>
    </div>

    <div id="mainApp" style="display: none;">
        <header class="profile-header">
            <div class="flex justify-between items-center mb-6">
                <h1 class="ig-logo">amnesfubbia</h1>
                <div class="flex gap-5 text-xl">
                    <i class="fa-regular fa-square-plus"></i>
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>

            <div class="flex items-center gap-8 mb-4">
                <div class="relative">
                    <div class="w-20 h-20 rounded-full border border-zinc-800 p-1">
                        <img src="https://i.pinimg.com/736x/8e/8e/8e.jpg" class="w-full h-full rounded-full object-cover" onerror="this.src='https://ui-avatars.com/api/?name=AM&background=333&color=fff'">
                    </div>
                    <div class="absolute bottom-0 right-0 bg-blue-500 border-2 border-black rounded-full w-6 h-6 flex items-center justify-center text-[10px]">
                        <i class="fa-solid fa-plus"></i>
                    </div>
                </div>
                <div class="flex grow justify-around text-center">
                    <div><div class="font-bold">1.2M</div><div class="text-xs text-zinc-400">Listeners</div></div>
                    <div><div class="font-bold">450</div><div class="text-xs text-zinc-400">Playlists</div></div>
                    <div><div class="font-bold">89</div><div class="text-xs text-zinc-400">Artists</div></div>
                </div>
            </div>

            <div class="text-sm mb-4">
                <div class="font-bold">amnesfubbia music</div>
                <div class="text-zinc-400">Your neighbor's favorite playlist 🎧</div>
                <div class="text-blue-400">linkbio.co/amnesfubbia-music</div>
            </div>
        </header>

        <div class="flex gap-4 overflow-x-auto p-4 no-scrollbar border-b border-zinc-900">
            <div class="flex flex-col items-center gap-1" onclick="searchMusic('Trending')">
                <div class="highlight-circle"><img src="https://i.scdn.co/image/ab67706f0000ce153b6555465e99763750059c23"></div>
                <span class="text-[10px]">Trending</span>
            </div>
            <div class="flex flex-col items-center gap-1" onclick="searchMusic('Lo-fi')">
                <div class="highlight-circle"><img src="https://i.scdn.co/image/ab67616d0000b27376097e335805f32a68897597"></div>
                <span class="text-[10px]">Lofi</span>
            </div>
            <div class="flex flex-col items-center gap-1" onclick="searchMusic('Phonk')">
                <div class="highlight-circle"><img src="https://i.scdn.co/image/ab67616d0000b27339893d7c585c57500a167822"></div>
                <span class="text-[10px]">Phonk</span>
            </div>
            <div class="flex flex-col items-center gap-1" onclick="searchMusic('City Pop')">
                <div class="highlight-circle"><img src="https://i.scdn.co/image/ab67616d0000b2730623d60882e75e9b8988686e"></div>
                <span class="text-[10px]">City Pop</span>
            </div>
        </div>

        <div id="musicGrid" class="music-grid">
            </div>
    </div>

    <div id="playerModal">
        <div class="sticky top-0 bg-black z-50 flex items-center px-4 h-14 border-b border-zinc-900">
            <i class="fa-solid fa-chevron-left text-xl" onclick="closePlayer()"></i>
            <div class="grow text-center font-bold text-sm tracking-tighter">NOW PLAYING</div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>

        <img id="modalArt" src="" class="album-art-full">

        <div class="p-4">
            <div class="flex justify-between items-center mb-2">
                <div class="flex gap-4 text-2xl">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>
                <i class="fa-regular fa-bookmark text-2xl"></i>
            </div>
            
            <div class="font-bold text-lg" id="modalTitle">Track Name</div>
            <div class="text-sm text-zinc-400 mb-4" id="modalArtist">Artist Name</div>

            <audio id="mainAudio" controls src=""></audio>

            <div class="mt-4 p-4 bg-zinc-950 rounded-xl border border-zinc-900">
                <div class="text-[10px] font-black uppercase text-zinc-500 mb-2 tracking-widest">Lyrics Preview (Genius)</div>
                <div class="text-sm leading-relaxed text-zinc-300 italic" id="modalLyrics">
                    "Memuat lirik melalui Genius API..."
                </div>
            </div>
            
            <button class="w-full mt-4 bg-white text-black font-black py-3 rounded-lg text-xs uppercase tracking-tighter" id="btnDownload">
                Download Full Track (SoundCloud)
            </button>
        </div>
    </div>

    <nav class="bottom-nav">
        <i class="fa-solid fa-house nav-item active"></i>
        <i class="fa-solid fa-magnifying-glass nav-item" onclick="searchPrompt()"></i>
        <i class="fa-solid fa-compact-disc nav-item"></i>
        <i class="fa-regular fa-heart nav-item"></i>
        <div class="w-6 h-6 rounded-full bg-zinc-800 border border-zinc-700"></div>
    </nav>

    <script>
        // Simulasi database musik awal
        const INITIAL_QUERY = "Japanese City Pop";
        
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                searchMusic(INITIAL_QUERY);
            }, 2000);
        };

        async function searchMusic(query) {
            const grid = document.getElementById('musicGrid');
            grid.innerHTML = '<div class="col-span-3 text-center py-20 text-zinc-500 text-xs animate-pulse">Scanning Waves...</div>';
            
            try {
                // Menggunakan iTunes API sebagai Metadata source (Sangat stabil untuk metadata & artwork)
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=21`);
                const data = await response.json();
                
                grid.innerHTML = '';
                data.results.forEach(track => {
                    const card = document.createElement('div');
                    card.className = 'track-card';
                    card.onclick = () => openPlayer(track);
                    card.innerHTML = `
                        <img src="${track.artworkUrl100.replace('100x100', '600x600')}" loading="lazy">
                        <div class="track-overlay">
                            <div class="track-title truncate">${track.trackName}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = '<div class="col-span-3 text-center py-20 text-red-500 text-xs">Connection Lost.</div>';
            }
        }

        function openPlayer(track) {
            document.getElementById('modalArt').src = track.artworkUrl100.replace('100x100', '600x600');
            document.getElementById('modalTitle').innerText = track.trackName;
            document.getElementById('modalArtist').innerText = track.artistName;
            document.getElementById('mainAudio').src = track.previewUrl;
            document.getElementById('playerModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            // Integrasi Logic Download (Redirect ke SoundCloud Search sesuai konsepmu)
            document.getElementById('btnDownload').onclick = () => {
                window.open(`https://soundcloud.com/search?q=${encodeURIComponent(track.trackName + ' ' + track.artistName)}`, '_blank');
            };

            // Simulasi Lirik (Bisa diintegrasi ke Genius API nantinya)
            document.getElementById('modalLyrics').innerText = `Looking for "${track.trackName}" lyrics on Genius... \n\n(API Key Genius diperlukan untuk lirik real-time)`;
        }

        function closePlayer() {
            document.getElementById('playerModal').style.display = 'none';
            document.getElementById('mainAudio').pause();
            document.body.style.overflow = 'auto';
        }

        function searchPrompt() {
            const q = prompt("Cari lagu, genre, atau artis favoritmu:");
            if (q) searchMusic(q);
        }
    </script>
</body>
</html>
